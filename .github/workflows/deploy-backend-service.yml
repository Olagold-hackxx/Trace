name: Deploy Backend Service to EC2

on:
  push:
    branches:
      - production
    paths:
      - "backend/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
          ECR_REPOSITORY: ${{ secrets.ECR_BACKEND_REPOSITORY }}
          IMAGE_TAG: latest
        run: |
          cd backend
          docker build -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" .
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

      - name: Get ECR login token (on the runner, which has AWS credentials)
        id: ecr-token
        run: |
          echo "token=$(aws ecr get-login-password --region ${{ secrets.AWS_REGION }})" >> $GITHUB_OUTPUT

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        env:
          ECR_TOKEN: ${{ steps.ecr-token.outputs.token }}
          ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
          IMAGE: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ secrets.ECR_BACKEND_REPOSITORY }}:latest
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_SYNC: ${{ secrets.DB_SYNC }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          REDIS_PORT: ${{ secrets.REDIS_PORT }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SQUAD_SECRET_KEY: ${{ secrets.SQUAD_SECRET_KEY }}
          SQUAD_PUBLIC_KEY: ${{ secrets.SQUAD_PUBLIC_KEY }}
          SQUAD_WEBHOOK_SECRET: ${{ secrets.SQUAD_WEBHOOK_SECRET }}
          SQUAD_BASE_URL: ${{ secrets.SQUAD_BASE_URL }}
          SQUAD_BENEFICIARY_ACCOUNT: ${{ secrets.SQUAD_BENEFICIARY_ACCOUNT }}
          SQUAD_PAYOUT_ACCOUNT_NUMBER: ${{ secrets.SQUAD_PAYOUT_ACCOUNT_NUMBER }}
          SQUAD_PAYOUT_BANK_CODE: ${{ secrets.SQUAD_PAYOUT_BANK_CODE }}
          SQUAD_MERCHANT_ID: ${{ secrets.SQUAD_MERCHANT_ID }}
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          SQUAD_REDIRECT_URL: ${{ secrets.SQUAD_REDIRECT_URL }}
          PUBLIC_WEBHOOK_URL: ${{ secrets.PUBLIC_WEBHOOK_URL }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ECR_TOKEN,ECR_REGISTRY,IMAGE,DATABASE_URL,DB_HOST,DB_PORT,DB_NAME,DB_USER,DB_PASSWORD,DB_SYNC,REDIS_URL,REDIS_HOST,REDIS_PORT,REDIS_PASSWORD,JWT_SECRET,SQUAD_SECRET_KEY,SQUAD_PUBLIC_KEY,SQUAD_WEBHOOK_SECRET,SQUAD_BASE_URL,SQUAD_BENEFICIARY_ACCOUNT,SQUAD_PAYOUT_ACCOUNT_NUMBER,SQUAD_PAYOUT_BANK_CODE,SQUAD_MERCHANT_ID,APP_BASE_URL,FRONTEND_URL,SQUAD_REDIRECT_URL,PUBLIC_WEBHOOK_URL
          script: |
            echo "$ECR_TOKEN" | sudo docker login --username AWS --password-stdin "$ECR_REGISTRY"

            if [ -z "$DATABASE_URL" ] && { [ -z "$DB_HOST" ] || [ -z "$DB_NAME" ] || [ -z "$DB_USER" ]; }; then
              echo "ERROR: set DATABASE_URL or provide DB_HOST, DB_NAME, and DB_USER secrets."
              exit 1
            fi

            DB_PORT_VALUE="${DB_PORT:-5432}"
            DB_SYNC_VALUE="${DB_SYNC:-false}"
            REDIS_URL_VALUE="${REDIS_URL:-}"
            REDIS_HOST_VALUE="${REDIS_HOST:-localhost}"
            REDIS_PORT_VALUE="${REDIS_PORT:-6379}"

            # Free disk space before pulling
            sudo docker stop backend-service 2>/dev/null || true
            sudo docker rm   backend-service 2>/dev/null || true
            sudo docker image prune -af 2>/dev/null || true

            sudo docker pull "$IMAGE"

            sudo docker run -d \
              --name backend-service \
              --restart unless-stopped \
              -p 3001:3001 \
              -e PORT=3001 \
              -e NODE_ENV=production \
              -e DATABASE_URL="$DATABASE_URL" \
              -e DB_HOST="$DB_HOST" \
              -e DB_PORT="$DB_PORT_VALUE" \
              -e DB_NAME="$DB_NAME" \
              -e DB_USER="$DB_USER" \
              -e DB_PASSWORD="$DB_PASSWORD" \
              -e DB_SYNC="$DB_SYNC_VALUE" \
              -e REDIS_URL="$REDIS_URL_VALUE" \
              -e REDIS_HOST="$REDIS_HOST_VALUE" \
              -e REDIS_PORT="$REDIS_PORT_VALUE" \
              -e REDIS_PASSWORD="$REDIS_PASSWORD" \
              -e JWT_SECRET="$JWT_SECRET" \
              -e SQUAD_SECRET_KEY="$SQUAD_SECRET_KEY" \
              -e SQUAD_PUBLIC_KEY="$SQUAD_PUBLIC_KEY" \
              -e SQUAD_WEBHOOK_SECRET="$SQUAD_WEBHOOK_SECRET" \
              -e SQUAD_BASE_URL="$SQUAD_BASE_URL" \
              -e SQUAD_BENEFICIARY_ACCOUNT="$SQUAD_BENEFICIARY_ACCOUNT" \
              -e SQUAD_PAYOUT_ACCOUNT_NUMBER="$SQUAD_PAYOUT_ACCOUNT_NUMBER" \
              -e SQUAD_PAYOUT_BANK_CODE="$SQUAD_PAYOUT_BANK_CODE" \
              -e SQUAD_MERCHANT_ID="$SQUAD_MERCHANT_ID" \
              -e APP_BASE_URL="$APP_BASE_URL" \
              -e FRONTEND_URL="$FRONTEND_URL" \
              -e SQUAD_REDIRECT_URL="$SQUAD_REDIRECT_URL" \
              -e PUBLIC_WEBHOOK_URL="$PUBLIC_WEBHOOK_URL" \
              "$IMAGE"

            echo "Waiting for service to be healthy..."
            for i in $(seq 1 12); do
              if curl -sf http://localhost:3001/health > /dev/null; then
                echo "Service is healthy."
                exit 0
              fi
              echo "Attempt $i/12..."
              sleep 5
            done

            echo "ERROR: health check failed after 60s failure"
            sudo docker logs --tail 50 backend-service
            exit 1
