services:
  backend:
    build:
      context: ./backend
    container_name: kudiscore-backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/kudiscore
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      ML_SERVICE_URL: http://ml_service:8000
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      ml_service:
        condition: service_started

  ml_service:
    build:
      context: ./ml_service
    container_name: kudiscore-ml-service
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/kudiscore
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: kudiscore-postgres
    environment:
      POSTGRES_DB: kudiscore
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kudiscore"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: kudiscore-redis
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
